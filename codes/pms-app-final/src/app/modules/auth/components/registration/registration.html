<form (submit)="submit(frm)" ngForm #frm="ngForm">
    <fieldset>
        <legend>Register</legend>
        <div>
            <label for="txtUserName">UserName: &nbsp;</label>
            <input type="text" id="txtUserName" ngModel name="username">
        </div>
        <div>
            <label for="txtPassword">Password: &nbsp;</label>
            <input type="password" id="txtPassword" ngModel name="password">
        </div>
        <div>
            <button type="submit">Register</button>
        </div>
    </fieldset>
</form>
