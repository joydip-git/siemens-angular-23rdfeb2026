<table>
    <thead>
        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Rating</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody>
        @for (p of products(); track $index) {
            <tr>
                <td>
                    <img [src]="p.imageUrl" alt="NA" class="img-box">
                </td>
                <td>
                    {{p.productName}}
                </td>
                <td>
                    {{p.price}}
                </td>
                <td>
                    {{p.starRating}}
                </td>
                <td>
                    <button type="button">Delete</button>
                </td>
            </tr>
        }
    </tbody>
</table>
